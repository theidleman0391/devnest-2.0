<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devnest — AI-Powered Web Design</title>
  <link rel="icon" type="image/svg+xml" href="favicon-white.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" href="favicon-black.svg" media="(prefers-color-scheme: light)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["'Instrument Serif'", "serif"],
            body: ["'Barlow'", "sans-serif"],
          },
          colors: {
            foreground: '#ffffff',
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #000; color: #fff; font-family: 'Barlow', sans-serif; overflow-x: hidden; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .video-fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to bottom, black, transparent);
      pointer-events: none;
      z-index: 2;
    }
    .video-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to top, black, transparent);
      pointer-events: none;
      z-index: 2;
    }

    @keyframes blurFadeIn {
      0%   { filter: blur(10px); opacity: 0; transform: translateY(50px); }
      50%  { filter: blur(5px);  opacity: 0.5; transform: translateY(-5px); }
      100% { filter: blur(0px);  opacity: 1;   transform: translateY(0); }
    }
    @keyframes fadeInUp {
      0%   { filter: blur(10px); opacity: 0; transform: translateY(30px); }
      100% { filter: blur(0px);  opacity: 1;   transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .section-heading {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(2.25rem, 5vw, 3.75rem);
      color: white;
      letter-spacing: -0.02em;
      line-height: 0.9;
    }
    /* Simple fix for FOUC on animated elements */
    [style*="animation"] {
      opacity: 0;
      animation-fill-mode: both !important;
    }

    @media (max-width: 1366px) and (min-width: 1025px) {
      html { zoom: 0.82; }
    }
  </style>
</head>
<body class="bg-black text-white">
  <div id="root"></div>

  <script>
    console.log('🚀 Starting app initialization...');
    window.addEventListener('error', (e) => {
      console.error('❌ Error:', e.message, e.filename, e.lineno);
    });
  </script>

  <script type="text/babel" src="devnest/shared.jsx"></script>
  <script type="text/babel" src="devnest/Navbar.jsx"></script>
  <script type="text/babel" src="devnest/Hero.jsx"></script>
  <script type="text/babel" src="devnest/StartSection.jsx"></script>
  <script type="text/babel" src="devnest/FeaturesChess.jsx"></script>
  <script type="text/babel" src="devnest/FeaturesGrid.jsx"></script>
  <script type="text/babel" src="devnest/Stats.jsx"></script>
  <script type="text/babel" src="devnest/Testimonials.jsx"></script>
  <script type="text/babel" src="devnest/CtaFooter.jsx"></script>
  <script type="text/babel" src="devnest/App.jsx"></script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#000"/>
      <rect x="20" y="15" width="80" height="50" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <text x="60" y="44" font-family="serif" font-style="italic" font-size="12" fill="white" text-anchor="middle">Devnest</text>
    </svg>
  </template>
</body>
</html>
