<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devnest</title>
  <meta name="description" content="Planes y precios para diseño web premium accesible para startups y empresas.">
  <link rel="canonical" href="https://devnest.lat/precios">
  <link rel="icon" type="image/svg+xml" href="favicon-white.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" href="favicon-black.svg" media="(prefers-color-scheme: light)">
  <link rel="alternate" type="text/markdown" title="LLM-friendly content" href="/llms.txt">
  <link rel="preload" href="dist/fonts/barlow-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="dist/fonts.css">
  <link rel="stylesheet" href="dist/styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin defer></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: 'Barlow', sans-serif; overflow-x: hidden; }
    @keyframes blurFadeIn {
      0%   { filter: blur(10px); opacity: 0; transform: translateY(50px); }
      50%  { filter: blur(5px);  opacity: 0.5; transform: translateY(-5px); }
      100% { filter: blur(0px);  opacity: 1;   transform: translateY(0); }
    }
    @keyframes fadeInUp {
      0%   { filter: blur(10px); opacity: 0; transform: translateY(30px); }
      100% { filter: blur(0px);  opacity: 1;   transform: translateY(0); }
    }

    .liquid-glass {
      background: rgba(255,255,255,0.01); background-blend-mode: luminosity;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative; overflow: hidden;
    }
    .liquid-glass::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01); background-blend-mode: luminosity;
      backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
      border: none; box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative; overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .section-heading { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(2.25rem, 5vw, 3.75rem); color: white; letter-spacing: -0.02em; line-height: 0.9; }
    @media (max-width: 1366px) and (min-width: 1025px) {
      html { zoom: 0.82; }
    }
  </style>
</head>
<body class="bg-black text-white">
  <div id="root"></div>
  <script src="dist/devnest/shared.js" defer></script>
  <script src="dist/devnest/Navbar.js" defer></script>
  <script src="dist/devnest/PricingPage.js" defer></script>
  <script src="dist/devnest/CtaFooter.js" defer></script>
  <script src="dist/devnest/pages/PreciosApp.js" defer></script>
</body>
</html>
